<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>郑州英语单词挖宝</title>
  <style>
    :root{--sky:#dff5ff;--paper:#fffaf0;--ink:#263449;--muted:#657184;--leaf:#2f8a57;--red:#d84a3a;--gold:#f7b733;--soil:#8a552b;--line:rgba(38,52,73,.16)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Microsoft YaHei","Segoe UI",sans-serif;color:var(--ink);background:linear-gradient(#dff5ff 0 34%,#fff0b8 34% 100%)}button,input,select{font:inherit}
    .app{width:min(1120px,calc(100% - 24px));margin:auto;padding:18px 0 28px}.top{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center}.pill{display:inline-flex;align-items:center;justify-content:center;height:38px;padding:0 14px;border:2px solid var(--ink);border-radius:999px;background:#fff;font-weight:900;box-shadow:4px 4px 0 rgba(38,52,73,.12)}
    h1{margin:0;font-size:clamp(30px,5vw,56px);line-height:1.06}.sub{margin:8px 0 0;color:var(--muted);line-height:1.55}.scene{position:relative;height:116px;margin:8px 0 14px;overflow:hidden;border-bottom:5px solid rgba(47,138,87,.3)}.sun{position:absolute;right:7%;top:10px;width:74px;height:74px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 14px rgba(247,183,51,.22)}.tower{position:absolute;left:8%;bottom:0;width:94px;height:112px}.tower:before,.tower:after{content:"";position:absolute;left:50%;transform:translateX(-50%);border-left:36px solid transparent;border-right:36px solid transparent}.tower:before{bottom:0;border-bottom:104px solid #b87543}.tower:after{bottom:38px;border-bottom:66px solid #e2a75f}.river{position:absolute;left:0;right:0;bottom:0;height:34px;background:repeating-linear-gradient(120deg,#63bdd2 0 28px,#8bd5e5 28px 56px);clip-path:polygon(0 50%,15% 36%,30% 58%,47% 42%,65% 60%,82% 36%,100% 52%,100% 100%,0 100%)}
    .layout{display:grid;grid-template-columns:minmax(320px,1fr) 360px;gap:16px}.main,.side{background:rgba(255,250,240,.9);border:2px solid var(--line);border-radius:8px;box-shadow:0 18px 38px rgba(80,55,24,.14)}.main,.side{padding:14px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:12px}.metric{min-height:68px;padding:9px;border:2px solid var(--line);border-radius:8px;background:#fff}.metric span{display:block;color:var(--muted);font-size:13px}.metric b{font-size:25px}
    .courses{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}.course{min-height:46px;border:2px solid var(--line);border-radius:8px;background:#fff;font-weight:900;cursor:pointer}.course.active{background:#e8f7df;border-color:var(--leaf)}.board{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}.tile{aspect-ratio:1;border:0;border-radius:8px;background:linear-gradient(160deg,#a86934,var(--soil));box-shadow:inset 0 -8px 0 rgba(0,0,0,.14),0 4px 0 #623818;color:#fff;font-size:28px;font-weight:900;cursor:pointer}.tile.dug{background:#f2dfbd;color:var(--ink);box-shadow:inset 0 0 0 2px rgba(98,56,24,.18)}
    .head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}.head h2{margin:0;font-size:22px}.prompt{min-height:132px;padding:13px;border:2px dashed rgba(38,52,73,.25);border-radius:8px;background:#fff}.hint{color:var(--muted);font-weight:900;font-size:13px}.word{margin:8px 0 5px;color:var(--red);font-size:36px;font-weight:900;line-height:1.08}.meaning{margin:0;color:var(--muted);line-height:1.5}.choices{display:grid;gap:9px;margin-top:12px}.choice{min-height:46px;padding:8px 12px;border:2px solid var(--line);border-radius:8px;background:#fff;text-align:left;font-weight:900;cursor:pointer}.choice:hover:not(:disabled){border-color:var(--leaf)}.choice.ok{background:#e8f7df;border-color:var(--leaf)}.choice.no{background:#ffe2df;border-color:var(--red)}
    .spell{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:12px}.spell input{min-height:46px;padding:0 12px;border:2px solid var(--line);border-radius:8px}.spell button,.action{min-height:46px;border:0;border-radius:8px;background:var(--leaf);color:#fff;font-weight:900;cursor:pointer;box-shadow:0 4px 0 #1d633b}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.action.gold{background:var(--gold);color:#3f2b12;box-shadow:0 4px 0 #bd7d13}.msg{min-height:44px;margin-top:10px;font-weight:900;line-height:1.45}.pet{margin-top:12px;padding:10px;border:2px solid var(--line);border-radius:8px;background:#fff;line-height:1.45}.pet b{font-size:26px}.note{margin:10px 0 0;color:var(--muted);font-size:13px;line-height:1.5}
    @media(max-width:880px){.top,.layout{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.courses{grid-template-columns:repeat(2,1fr)}.side{order:-1}}@media(max-width:520px){.app{width:calc(100% - 16px)}.board{grid-template-columns:repeat(4,1fr)}.actions,.spell{grid-template-columns:1fr}.tile{min-height:64px}.scene{height:92px}}
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div>
        <h1>郑州英语单词挖宝</h1>
        <p class="sub">每一课是一张地图：挖开格子，完成英文选中文、中文选英文、看中文拼英文。答对加星星和能量豆，进度会自动保存在这台电脑上。</p>
      </div>
      <div class="pill">新概念英语一</div>
    </header>
    <section class="scene"><div class="sun"></div><div class="tower"></div><div class="river"></div></section>
    <section class="layout">
      <div class="main">
        <div class="stats">
          <div class="metric"><span>总星星</span><b id="score">0</b></div>
          <div class="metric"><span>能量豆</span><b id="beans">0</b></div>
          <div class="metric"><span>本课宝物</span><b id="found">0/0</b></div>
          <div class="metric"><span>连对</span><b id="streak">0</b></div>
        </div>
        <div class="courses" id="courses"></div>
        <div class="board" id="board" aria-label="挖宝地图"></div>
      </div>
      <aside class="side">
        <div class="head"><h2>单词挑战</h2><span class="pill" id="badge">准备</span></div>
        <div class="prompt">
          <div class="hint" id="hint">先选一课，再挖一个土地格子</div>
          <div class="word" id="word">Dig!</div>
          <p class="meaning" id="meaning">每块土地下面可能藏着单词题、星星或郑州小宝物。</p>
        </div>
        <div class="choices" id="choices"></div>
        <div class="actions">
          <button class="action" id="speak" type="button">读单词</button>
          <button class="action gold" id="reset" type="button">重置本课</button>
        </div>
        <div class="pet"><b id="petIcon">🐣</b> <strong id="petName">小豆</strong><br><span id="petText">I can learn with you.</span></div>
        <div class="msg" id="msg">准备好了就开挖吧。</div>
        <p class="note">拼写题大小写不敏感。答对：+10 星星、+2 能量豆、宠物经验 +3；答错也会鼓励复习。</p>
      </aside>
    </section>
  </main>
  <script>
    const lessons=[
      {id:"l1",title:"Lesson 1",treasure:"二七塔徽章",words:[["excuse","原谅"],["me","我"],["yes","是的"],["is","是"],["this","这"],["your","你的"],["handbag","手提包"],["pardon","请再说一遍"],["it","它"],["thank","感谢"],["you","你"],["very much","非常"]]},
      {id:"l3",title:"Lesson 3",treasure:"黄河浪花",words:[["pen","钢笔"],["pencil","铅笔"],["book","书"],["watch","手表"],["coat","上衣"],["dress","连衣裙"],["skirt","短裙"],["shirt","衬衫"],["car","汽车"],["house","房子"]]},
      {id:"l5",title:"Lesson 5",treasure:"火车票",words:[["umbrella","伞"],["please","请"],["here","这里"],["my","我的"],["ticket","票"],["number","号码"],["five","五"],["sorry","对不起"],["sir","先生"],["cloakroom","衣帽存放处"]]},
      {id:"l7",title:"Lesson 7",treasure:"少林能量带",words:[["suit","一套衣服"],["school","学校"],["teacher","老师"],["son","儿子"],["daughter","女儿"]]}
    ].map(l=>({...l,words:l.words.map(([word,cn])=>({word,cn}))}));
    const key="zz_word_treasure_new_concept_v1";
    const saved=JSON.parse(localStorage.getItem(key)||"{}");
    const state={course:saved.course||"l1",score:saved.score||0,beans:saved.beans||0,streak:0,petXp:saved.petXp||0,dug:saved.dug||{},current:null,locked:false,tiles:[]};
    const $=id=>document.getElementById(id);
    const board=$("board"),choices=$("choices"),courses=$("courses");
    function save(){localStorage.setItem(key,JSON.stringify({course:state.course,score:state.score,beans:state.beans,petXp:state.petXp,dug:state.dug}))}
    function lesson(){return lessons.find(x=>x.id===state.course)}
    function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
    function norm(s){return String(s).trim().toLowerCase().replace(/\s+/g," ")}
    function renderCourses(){courses.innerHTML="";lessons.forEach(l=>{const b=document.createElement("button");b.className="course"+(l.id===state.course?" active":"");b.textContent=l.title;b.onclick=()=>{state.course=l.id;newMap(false)};courses.appendChild(b)})}
    function makeTiles(){const l=lesson(),wordTiles=l.words.map(w=>({type:"word",item:w}));const extras=[{type:"treasure"},{type:"star"},{type:"star"},{type:"empty"}];return shuffle([...wordTiles,...extras])}
    function newMap(reset){const l=lesson();if(reset)state.dug[l.id]=[];state.tiles=makeTiles();state.current=null;state.locked=false;renderCourses();renderBoard();setPrompt("先点一个土地格子","Dig!",`${l.title} 地图：挖完这一课的单词就能拿到「${l.treasure}」。`);choices.innerHTML="";$("badge").textContent="准备";$("msg").textContent="新地图准备好了。";renderStats();save()}
    function renderBoard(){const dug=new Set(state.dug[state.course]||[]);board.innerHTML="";state.tiles.forEach((t,i)=>{const b=document.createElement("button");b.className="tile"+(dug.has(i)?" dug":"");b.disabled=dug.has(i);b.textContent=dug.has(i)?"✓":"⛏";b.onclick=()=>dig(i,b);board.appendChild(b)})}
    function renderStats(){const l=lesson(),dug=state.dug[l.id]||[];$("score").textContent=state.score;$("beans").textContent=state.beans;$("streak").textContent=state.streak;$("found").textContent=`${Math.min(dug.length,l.words.length)}/${l.words.length}`;const level=Math.floor(state.petXp/20)+1;$("petIcon").textContent=level>2?"🐥":"🐣";$("petName").textContent=`小豆 Lv.${level}`;$("petText").textContent=level>2?"Good job! I like English.":"I can learn with you."}
    function setPrompt(h,w,m){$("hint").textContent=h;$("word").textContent=w;$("meaning").textContent=m}
    function dig(i,b){if(state.locked)return;const l=lesson();state.dug[l.id]=[...(state.dug[l.id]||[]),i];b.classList.add("dug");b.disabled=true;const t=state.tiles[i];if(t.type==="star"){state.score+=3;state.beans+=1;b.textContent="⭐";setPrompt("挖到星星","+3","继续找单词宝藏。");$("msg").textContent="闪亮星星到手。"}else if(t.type==="treasure"){state.score+=12;state.beans+=3;b.textContent="🎁";setPrompt("找到课程宝物",l.treasure,"这是一课地图的奖励。");$("msg").textContent=`获得 ${l.treasure}！`}else if(t.type==="empty"){b.textContent="土";setPrompt("这里是空地","Try again","再挖一格试试。");$("msg").textContent="没有宝物，也算探索了一步。"}else{b.textContent="ABC";challenge(t.item)}renderStats();save()}
    function challenge(item){state.locked=true;const mode=shuffle(["en-cn","cn-en","spell-cn"])[0];state.current={...item,mode};$("badge").textContent="答题中";choices.innerHTML="";if(mode==="en-cn"){setPrompt("英文选中文",item.word,"选择这个英文单词的中文意思。");choiceButtons(item.cn,shuffle(lesson().words.filter(w=>w.cn!==item.cn)).slice(0,3).map(w=>w.cn))}else if(mode==="cn-en"){setPrompt("中文选英文",item.cn,"选择正确的英文单词。");choiceButtons(item.word,shuffle(lesson().words.filter(w=>w.word!==item.word)).slice(0,3).map(w=>w.word))}else{setPrompt("看中文拼英文",item.cn,"在下面输入对应英文。");const box=document.createElement("div");box.className="spell";box.innerHTML='<input id="spellInput" autocomplete="off" placeholder="输入英文"><button type="button">提交</button>';choices.appendChild(box);box.querySelector("button").onclick=()=>answer(box.querySelector("input").value);box.querySelector("input").addEventListener("keydown",e=>{if(e.key==="Enter")answer(e.target.value)});box.querySelector("input").focus()}$("msg").textContent="认真看题，答对就有能量豆。"}
    function choiceButtons(correct,wrong){shuffle([correct,...wrong]).forEach(text=>{const b=document.createElement("button");b.className="choice";b.textContent=text;b.onclick=()=>answer(text,b);choices.appendChild(b)})}
    function answer(value,btn){const c=state.current;if(!c)return;const correct=c.mode==="spell-cn"?norm(value)===norm(c.word):value===(c.mode==="en-cn"?c.cn:c.word);document.querySelectorAll(".choice").forEach(b=>{b.disabled=true;if(b.textContent===(c.mode==="en-cn"?c.cn:c.word))b.classList.add("ok")});if(correct){state.score+=10+Math.min(state.streak,5);state.beans+=2;state.petXp+=3;state.streak++;$("msg").textContent=`答对了！${c.word} = ${c.cn}`;if(btn)btn.classList.add("ok")}else{state.streak=0;if(btn)btn.classList.add("no");$("msg").textContent=`再记一次：${c.word} = ${c.cn}`}state.current=null;state.locked=false;$("badge").textContent="继续挖";renderStats();save()}
    $("reset").onclick=()=>newMap(true);
    $("speak").onclick=()=>{const text=state.current?.word||$("word").textContent;if(!("speechSynthesis" in window)||!text||text==="Dig!")return $("msg").textContent="挖到单词后再读。";const u=new SpeechSynthesisUtterance(text);u.lang="en-US";u.rate=.82;speechSynthesis.cancel();speechSynthesis.speak(u)};
    newMap(false);
  </script>
</body>
</html>
